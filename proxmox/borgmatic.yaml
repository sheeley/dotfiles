source_directories:
  - /etc/pve
  - /etc/vzdump.conf
  - /local-2tb/
  # - /root/.config/borgmatic/config.yaml
  # - /etc/systemd/system/backup.service
  # - /etc/systemd/system/backup.timer
  # - /root/backup
  #- /etc/qemu-server

repositories:
  - path: /local-2tb/backup
  - path: ssh://ok6o7xsu@ok6o7xsu.repo.borgbase.com/./repo
    label: "proxmox on BorgBase"

exclude_patterns:
  - "*.pyc"
  - ~/*/.cache

# Stay in same file system (optional)
# one_file_system: true

compression: auto,zstd
encryption_passphrase: wVqxQ3vYCMog6vaFsvMUkyJDLmFrEm.shDUUbBbmmACyV.oeVEK_4RMceacbUzqcUV89b@F
archive_name_format: "{hostname}-{now:%Y-%m-%d-%H%M%S}"

# Number of times to retry a failing backup before giving up.
retries: 5
retry_wait: 5

keep_daily: 7
keep_weekly: 4
keep_monthly: 12

# Don't read whole repo each time
skip_actions:
  - check

check_last: 3

# Shell commands to execute before or after a backup
before_backup:
  - echo "`date` - Starting backup"

after_backup:
  - echo "`date` - Finished backup"
